<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheduler — Reset password</title>
  <meta name="theme-color" content="#dda15e" />
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .reset-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 32px;
    }
    .reset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px 22px 22px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(221,161,94,0.09);
    }
    .reset-heading {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--brown);
      margin-bottom: 4px;
    }
    .reset-sub {
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 22px;
      font-family: 'DM Mono', monospace;
    }
    .auth-error {
      font-size: 12.5px;
      color: #9a3010;
      background: rgba(154,48,16,0.07);
      border: 1px solid rgba(154,48,16,0.18);
      border-radius: 9px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: none;
    }
    .auth-error.show { display: block; }
    .success-msg {
      font-size: 13px;
      color: #2d6a4f;
      background: rgba(45,106,79,0.08);
      border: 1px solid rgba(45,106,79,0.2);
      border-radius: 9px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: none;
      line-height: 1.5;
    }
    .reset-btn {
      width: 100%;
      padding: 13px 18px;
      border-radius: 13px;
      background: var(--brown);
      color: var(--cream);
      border: none;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .reset-btn:hover    { background: #c48a4a; }
    .reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 42px; width: 100%; box-sizing: border-box; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px;
      display: flex; align-items: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="app-wordmark">Scheduler</div>
      </div>
    </header>

    <div class="page-band">
      <h1 class="page-title" style="font-style:italic">Reset password</h1>
    </div>

    <main class="content reset-content">
      <div class="reset-card">
        <p class="reset-heading">New password</p>
        <p class="reset-sub">choose something you'll remember</p>

        <div class="auth-error" id="reset-error"></div>
        <div class="success-msg" id="reset-success">
          Password updated! <a href="/login.html" style="color:var(--brown);font-weight:600;text-decoration:none">Sign in →</a>
        </div>

        <div class="field">
          <label>New password</label>
          <div class="pw-wrap">
            <input type="password" id="pw1" placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="toggleEye('pw1', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label>Confirm password</label>
          <div class="pw-wrap">
            <input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="toggleEye('pw2', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="reset-btn" id="reset-btn" onclick="submitReset()">Set new password</button>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = 'https://adaptive-scheduler-x6nw.onrender.com'

    // Get token from URL ?token=...
    const token = new URLSearchParams(window.location.search).get('token')
    if (!token) {
      document.getElementById('reset-error').textContent = 'Invalid reset link — please request a new one.'
      document.getElementById('reset-error').classList.add('show')
      document.getElementById('reset-btn').disabled = true
    }

    function toggleEye(inputId, btn) {
      const input = document.getElementById(inputId)
      const show  = input.type === 'password'
      input.type  = show ? 'text' : 'password'
      btn.innerHTML = show
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    }

    function showError(msg) {
      const el = document.getElementById('reset-error')
      el.textContent = msg
      el.classList.add('show')
    }

    async function submitReset() {
      document.getElementById('reset-error').classList.remove('show')
      const pw1 = document.getElementById('pw1').value
      const pw2 = document.getElementById('pw2').value

      if (!pw1)        { showError('Please enter a new password'); return }
      if (pw1.length < 6) { showError('Password must be at least 6 characters'); return }
      if (pw1 !== pw2) { showError('Passwords don\'t match'); return }

      const btn       = document.getElementById('reset-btn')
      btn.disabled    = true
      btn.textContent = 'Saving…'

      try {
        const res = await fetch(`${API_BASE}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw1 })
        })
        const data = await res.json()
        if (!res.ok) {
          showError(data.detail || 'Something went wrong. Try requesting a new link.')
          btn.disabled    = false
          btn.textContent = 'Set new password'
          return
        }
        document.getElementById('reset-success').style.display = 'block'
        btn.style.display = 'none'
      } catch (err) {
        showError('Could not connect. Try again.')
        btn.disabled    = false
        btn.textContent = 'Set new password'
      }
    }
  </script>
</body>
</html>
