<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheduler</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#dda15e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Scheduler" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Top Header ── -->
    <header class="top-bar">
      <div class="top-bar-inner">
        <div class="app-wordmark">Scheduler</div>
        <div class="top-datetime">
          <div class="top-date" id="today-date"></div>
          <div class="top-time-row">
            <span class="tz-badge" id="tz-badge">IST</span>
            <div class="top-time" id="today-time"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Page Title Band ── -->
    <div class="page-band">
      <h1 class="page-title" id="page-title">Reminders</h1>
      <span class="reminder-count" id="reminder-count"></span>
    </div>

    <!-- ── Main Scrollable Content ── -->
    <main class="content" id="main-content">
      <div class="reminders-area" id="reminders-area">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </div>
          <p>No reminders yet</p>
          <span>Tap the mic button and speak</span>
        </div>
      </div>

      <!-- Settings panel -->
      <div class="settings-panel" id="settings-panel" style="display:none">

        <!-- Time Words -->
        <div class="settings-group">
          <div class="settings-label">Time Words</div>
          <div class="settings-item">
            <span>Morning</span>
            <div class="settings-time-input">
              <input type="time" id="s-morning" value="08:00" onchange="saveSettings()" />
            </div>
          </div>
          <div class="settings-item">
            <span>Evening</span>
            <div class="settings-time-input">
              <input type="time" id="s-evening" value="18:00" onchange="saveSettings()" />
            </div>
          </div>
          <div class="settings-item">
            <span>Night</span>
            <div class="settings-time-input">
              <input type="time" id="s-night" value="21:00" onchange="saveSettings()" />
            </div>
          </div>
        </div>

        <!-- Vague Durations -->
        <div class="settings-group">
          <div class="settings-label">Vague Durations</div>
          <div class="settings-item">
            <span>"in a bit"</span>
            <div class="settings-stepper">
              <button onclick="stepValue('s-in-a-bit', -5)">−</button>
              <span id="s-in-a-bit-display">10</span>
              <input type="hidden" id="s-in-a-bit" value="10" />
              <span class="settings-unit">min</span>
              <button onclick="stepValue('s-in-a-bit', 5)">+</button>
            </div>
          </div>
          <div class="settings-item">
            <span>"after a while"</span>
            <div class="settings-stepper">
              <button onclick="stepValue('s-after-a-while', -5)">−</button>
              <span id="s-after-a-while-display">30</span>
              <input type="hidden" id="s-after-a-while" value="30" />
              <span class="settings-unit">min</span>
              <button onclick="stepValue('s-after-a-while', 5)">+</button>
            </div>
          </div>
        </div>

        <!-- Vibration -->
        <div class="settings-group">
          <div class="settings-label">Feel</div>
          <div class="settings-item">
            <div class="settings-item-label">
              <span>Vibration</span>
              <span class="settings-hint">on notification</span>
            </div>
            <div class="toggle" id="vibration-toggle" onclick="toggleVibration()">
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>

        <!-- Timezone -->
        <div class="settings-group">
          <div class="settings-label">Timezone</div>
          <div class="settings-item">
            <span>Your timezone</span>
            <select id="s-timezone" onchange="saveSettings()" class="settings-select">
              <option value="Asia/Kolkata">IST — India</option>
              <option value="America/New_York">EST — New York</option>
              <option value="America/Chicago">CST — Chicago</option>
              <option value="America/Denver">MST — Denver</option>
              <option value="America/Los_Angeles">PST — Los Angeles</option>
              <option value="Europe/London">GMT — London</option>
              <option value="Europe/Paris">CET — Paris</option>
              <option value="Europe/Berlin">CET — Berlin</option>
              <option value="Asia/Dubai">GST — Dubai</option>
              <option value="Asia/Singapore">SGT — Singapore</option>
              <option value="Asia/Tokyo">JST — Tokyo</option>
              <option value="Australia/Sydney">AEST — Sydney</option>
            </select>
          </div>
        </div>

        <!-- About -->
        <div class="settings-group">
          <div class="settings-label">About</div>
          <div class="settings-item"><span>Version</span><span class="settings-value">1.0.0</span></div>
          <div class="settings-item"><span>Backend</span><span class="settings-value">Render.com</span></div>
        </div>

      </div>
    </main>

    <!-- ── Chat Bubbles ── -->
    <div class="chat-bubbles" id="chat-bubbles"></div>

    <!-- ── Type Input Area ── -->
    <div class="type-area" id="type-area">
      <input type="text" id="type-input" placeholder="Type your reply…" />
      <button id="type-send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- ── Bottom Nav ── -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-reminders" onclick="switchView('reminders')">
        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <span class="nav-label">Reminders</span>
      </button>

      <button class="nav-btn" id="nav-recurring" onclick="switchView('recurring')">
        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </div>
        <span class="nav-label">Recurring</span>
      </button>

      <!-- Record — center big button -->
      <button class="nav-btn nav-record" id="mic-btn" aria-label="Record voice reminder">
        <div class="record-ring"></div>
        <div class="record-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </button>

      <button class="nav-btn" id="nav-done" onclick="switchView('done')">
        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="nav-label">Done</span>
      </button>

      <button class="nav-btn" id="nav-settings" onclick="switchView('settings')">
        <div class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <!-- ── Mic Toast ── -->
    <div class="mic-toast" id="mic-toast"></div>

    <!-- ── Type Toggle Pill ── -->
    <button class="type-toggle" id="type-btn" style="display:none" aria-label="Type reply">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 6.1H3"/><path d="M21 12.1H3"/><path d="M15.1 18H3"/>
      </svg>
      <span>type reply</span>
    </button>
  </div>

  <!-- ── Confirm Modal ── -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title">Save Reminder</div>
        <button class="modal-close" id="btn-cancel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="field-title" placeholder="What's this reminder for?" />
      </div>
      <div class="field">
        <label>Date &amp; Time</label>
        <input type="datetime-local" id="field-datetime" />
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="field-location" placeholder="Optional" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Type</label>
          <select id="field-type">
            <option value="meeting">Meeting</option>
            <option value="medication">Medication</option>
            <option value="task">Task</option>
            <option value="casual">Casual</option>
          </select>
        </div>
        <div class="field">
          <label>Repeat</label>
          <select id="field-repeat">
            <option value="none">None</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel-2">Discard</button>
        <button class="btn-save" id="btn-save">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Save Reminder
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
